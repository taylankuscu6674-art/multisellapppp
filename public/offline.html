<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f9f7a" />
    <title>Listiq is offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f9fc;
        color: #16211f;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(92vw, 520px);
        border: 1px solid #d9e1e8;
        border-radius: 8px;
        background: white;
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        color: #63706d;
        line-height: 1.6;
      }

      a {
        color: #0f9f7a;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Listiq is offline</h1>
      <p>Your app shell is installed, but this page needs a connection. Check the network and open the dashboard again.</p>
      <a href="/app">Open app</a>
    </main>
  </body>
</html>
